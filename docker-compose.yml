services:
  minio:
    image: quay.io/minio/minio:latest
    container_name: yogavibe-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - minio_data:/data

  minio-init:
    image: quay.io/minio/mc:latest
    container_name: yogavibe-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'waiting for minio';
        sleep 1;
      done &&
      mc mb --ignore-existing local/yogavibe-files &&
      mc anonymous set none local/yogavibe-files
      "
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: yogavibe-backend
    restart: unless-stopped
    env_file:
      - ./backend/app/.env
    environment:
      DATABASE_URL: sqlite:///./data/yogavibe.db
      FILE_STORAGE_PROVIDER: s3
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_ENDPOINT_URL: http://localhost:9000
      STORAGE_PUBLIC_BASE_URL: http://localhost:8000
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/app:/app
      - backend_data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yogavibe-frontend
    restart: unless-stopped
    working_dir: /app
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: npm start
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  minio_data:
  backend_data:
  frontend_node_modules:
